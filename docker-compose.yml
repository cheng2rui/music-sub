services:
  music-sub:
    image: ghcr.io/cheng2rui/music-sub:0.8.0
    # For local development builds, uncomment:
    # build: .
    container_name: music-sub
    ports:
      - "8400:8400"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./data/downloads:/downloads/music
      - ./data/library:/music
    environment:
      - MUSIC_SUB_CONFIG=/app/config/config.yaml
      - MUSIC_SUB_DB=/app/data/music_sub.db
      - no_proxy=*
      - NO_PROXY=*
    extra_hosts:
      # Stable Telegram Bot API IP for Docker DNS environments where local DNS returns blocked/poisoned routes.
      - "api.telegram.org:149.154.166.110"
    dns:
      - 223.5.5.5
      - 119.29.29.29
      - 8.8.8.8
    # If you already have a qBittorrent container/NAS app, point
    # qbittorrent.host in config/config.yaml to that instance and do not start
    # the optional bundled service below.
    restart: unless-stopped

  qbittorrent:
    profiles: ["bundled-qb"]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: music-sub-qb
    ports:
      - "8401:8080"
      - "57881:57881"
      - "57881:57881/udp"
    volumes:
      - ./data/qb-config:/config
      - ./data/downloads:/downloads/music
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8080
      - TORRENTING_PORT=57881
    restart: unless-stopped
