  <path d="M82 255c0-96 78-174 174-174 45 0 86 17 117 45" fill="none" stroke="url(#g1)" stroke-width="12" stroke-linecap="round" opacity="0.28"/>
  <path d="M386 294c-17 56-69 97-130 97-32 0-61-11-84-30" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round" opacity="0.32"/>

  <!-- album/library stack -->
