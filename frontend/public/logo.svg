<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Music Sub logo">
  <defs>
    <linearGradient id="g1" x1="112" y1="92" x2="412" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35f5a7"/>
      <stop offset="0.48" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="156" y1="126" x2="354" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="0.35" stop-color="#7dd3fc"/>
