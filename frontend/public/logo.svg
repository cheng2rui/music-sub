    <rect x="152" y="302" width="202" height="42" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="6"/>
    <rect x="168" y="264" width="218" height="56" rx="20" fill="#111827" stroke="#10b981" stroke-opacity="0.62" stroke-width="7"/>
    <rect x="190" y="223" width="214" height="66" rx="24" fill="#0b1220" stroke="url(#g1)" stroke-width="9"/>
  </g>

