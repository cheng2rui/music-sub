sites:
  mteam:
    enabled: true
    url: https://kp.m-team.cc
    api_key: ""
    token: ""
  opencd:
    enabled: false
    url: https://open.cd
    cookie: ""
  ptclub:
    enabled: false
    url: https://pt.sjtu.edu.cn
    cookie: ""
  dismusic:
    enabled: false
    url: https://dis.music
    cookie: ""

qbittorrent:
  host: http://192.168.1.1:8080
  username: admin
  password: ""
  category: music
  save_path: /downloads/music
  tag: music-sub

paths:
  library: /music
  structure: "{artist}/{album}"
  downloads: /downloads/music

scraper:
  sources:
    - qqmusic
    - netease
    - musicbrainz
  embed_cover: true
  cover_max_size: 0          # 0=原图, >0=缩略图宽度(px)
  save_cover_file: true      # 保存 cover.jpg
  save_lyrics: true
  save_lyrics_to_tag: true   # 写入歌词到 ID3 标签
  save_lyrics_file: true     # 保存 .lrc 文件
  save_nfo: false
  rename_file: false         # 是否重命名文件
  rename_template: "${track} - ${title}"  # 支持变量: ${title}/${artist}/${album}/${track}/${filename}
  overwrite_tag: false       # 是否覆盖已有标签

scheduler:
  search_interval_minutes: 30
  check_complete_interval_minutes: 5
